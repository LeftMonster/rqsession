name: Build Wheels

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 (manylinux)
          - os: ubuntu-latest
            target: x86_64
            manylinux: "2_28"
            interpreter_args: >-
              -i /opt/python/cp38-cp38/bin/python
              /opt/python/cp39-cp39/bin/python
              /opt/python/cp310-cp310/bin/python
              /opt/python/cp311-cp311/bin/python
              /opt/python/cp312-cp312/bin/python
              /opt/python/cp313-cp313/bin/python
          # Linux aarch64 (manylinux, cross-compile)
          - os: ubuntu-latest
            target: aarch64
            manylinux: "2_28"
            interpreter_args: >-
              -i /opt/python/cp38-cp38/bin/python
              /opt/python/cp39-cp39/bin/python
              /opt/python/cp310-cp310/bin/python
              /opt/python/cp311-cp311/bin/python
              /opt/python/cp312-cp312/bin/python
              /opt/python/cp313-cp313/bin/python
            bindgen_extra_clang_args: "--sysroot=/usr/aarch64-linux-gnu --target=aarch64-unknown-linux-gnu"
          # Windows x86_64
          - os: windows-latest
            target: x86_64
            manylinux: "off"
            interpreter_args: ""

    steps:
      - uses: actions/checkout@v4

      # ── Windows: NASM required by BoringSSL asm optimisations ───────────
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/setup-nasm@v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # ── Build wheels ─────────────────────────────────────────────────────
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          BINDGEN_EXTRA_CLANG_ARGS: ${{ matrix.bindgen_extra_clang_args || '' }}
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist ${{ matrix.interpreter_args }}
          # Inside manylinux containers: cmake + NASM + clang for BoringSSL
          before-script-linux: |
            if command -v dnf &>/dev/null; then
              dnf install -y cmake nasm clang llvm-devel
            elif command -v yum &>/dev/null; then
              yum install -y cmake3 nasm clang && ln -sf cmake3 /usr/bin/cmake || true
            else
              apt-get update && apt-get install -y cmake nasm clang libc6-dev-arm64-cross || true
            fi

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/

  # ── Source distribution (fallback for unsupported platforms) ─────────────
  sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/

  # ── Publish all wheels + sdist to PyPI on tag push ───────────────────────
  release:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build, sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write  # required for Trusted Publisher (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
